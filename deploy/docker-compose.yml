version: '3.8'

env_file:
  - ../.env

services:
  postgres:
    image: postgres:16.8-alpine3.21
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: ${HC_PG_INTERVAL:-5s}
      timeout: ${HC_PG_TIMEOUT:-5s}
      retries: ${HC_PG_RETRIES:-3}
    networks:
      - app-network
    restart: unless-stopped

  service:
    build:
      context: ..
      dockerfile: deploy/service.Dockerfile
    environment:
      - POSTGRES_HOST=postgres   
      - POSTGRES_PORT=5432       
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FORMAT=${LOGGER_FORMAT}
      - LOGGER_MODEL=${LOGGER_MODEL}
      - MIGRATIONS_DIR=/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27.5-alpine
    ports:
      - "80:80"
    depends_on:
      - service
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: ${HC_NGINX_INTERVAL:-30s}
      timeout: ${HC_NGINX_TIMEOUT:-10s}
      retries: ${HC_NGINX_RETRIES:-5}

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge